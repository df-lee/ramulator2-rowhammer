Frontend:

  impl: SimpleO3
  clock_ratio: 8
  num_expected_insts: 500000

  traces: 

    - example_rh_physaddr.trace

  Translation:

    impl: RandomTranslation
    max_addr: 2147483648

MemorySystem:

  impl: GenericDRAM
  clock_ratio: 3

  DRAM:

    impl: DDR4

    org:

      preset: DDR4_8Gb_x8
      channel: 1
      rank: 2

    timing:

      preset: DDR4_2400R 

  Controller:

    impl: Generic

    Scheduler:

      impl: FRFCFS

    RefreshManager:

      impl: AllBank

    RowPolicy:

      impl: ClosedRowPolicy
      cap: 4

    plugins:

      - ControllerPlugin:

          impl: UniformTRR
          num_rows: 32768

          # Threshold
          enable_trr: true
          trr_threshold: 100
          flip_threshold: 4
          hammer_threshold: 1

          # Budget
          budget_window: 1000
          budget_per_window: 100

          # Probability
          flip_mode: probabilistic
          prob_function: linear
          prob_flip_start: 1
          prob_alpha: 0.5
          prob_k: 1.0
          prob_midpoint: 4.0
          random_seed: 12345

          debug: true

  AddrMapper:

    impl: RoBaRaCoCh
